name: Zenodo Release Draft

# Uploads release PDF/HTML to Zenodo as a *draft* new version.
# Publishing (new version DOI) stays manual in the Zenodo UI unless you opt in.
#
# Required repository secret (Settings → Secrets and variables → Actions):
#   ZENODO_ACCESS_TOKEN — https://zenodo.org/account/settings/applications/tokens/new/
#                       scopes: deposit:write, deposit:actions
#
# Optional repository variable:
#   ZENODO_RECORD_ID — latest published version record id (default: 20612210)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub release tag (e.g. SF-TR-2026-001-v1.0.1)'
        required: true
        type: string
      report_id:
        description: 'Report ID'
        required: true
        default: SF-TR-2026-001
        type: string
      zenodo_record_id:
        description: 'Latest Zenodo version record id'
        required: true
        default: '20612210'
        type: string
      publish:
        description: 'Auto-publish on Zenodo (mint new version DOI immediately)'
        required: false
        default: false
        type: boolean
  release:
    types: [published]

permissions:
  contents: read

jobs:
  zenodo-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use latest upload script (release tag may predate workflow fixes).
          ref: main

      # secrets.* cannot be used in job-level `if:` — check inside a step instead.
      - name: Check Zenodo token configured
        id: token
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_ACCESS_TOKEN }}
        run: |
          if [ -z "${ZENODO_ACCESS_TOKEN}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ZENODO_ACCESS_TOKEN repository secret is not set; skipping Zenodo upload."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve inputs
        if: steps.token.outputs.configured == 'true'
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "report_id=${{ inputs.report_id }}" >> "$GITHUB_OUTPUT"
            echo "record_id=${{ inputs.zenodo_record_id }}" >> "$GITHUB_OUTPUT"
            echo "publish=${{ inputs.publish }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.release.tag_name }}"
            echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "report_id=${TAG%%-v*}" >> "$GITHUB_OUTPUT"
            RECORD_ID="${{ vars.ZENODO_RECORD_ID }}"
            echo "record_id=${RECORD_ID:-20612210}" >> "$GITHUB_OUTPUT"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install tools
        if: steps.token.outputs.configured == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl
          gh --version

      - name: Upload Zenodo draft (no publish by default)
        if: steps.token.outputs.configured == 'true'
        env:
          ZENODO_ACCESS_TOKEN: ${{ secrets.ZENODO_ACCESS_TOKEN }}
          ZENODO_PUBLISH: ${{ steps.vars.outputs.publish }}
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/zenodo-new-version.sh
          ./scripts/zenodo-new-version.sh \
            "${{ steps.vars.outputs.report_id }}" \
            "${{ steps.vars.outputs.release_tag }}" \
            "${{ steps.vars.outputs.record_id }}"
